---
# GitHub Actions - Direct Action Usage
#
# This example uses the Armis CLI GitHub Action directly.
# For the recommended reusable workflow approach, see github-actions-reusable.yml
#
# Required secrets (JWT - recommended):
#   - ARMIS_CLIENT_ID: Client ID from VIPR external API screen
#   - ARMIS_CLIENT_SECRET: Client secret from VIPR external API screen
#
# Legacy secrets (Basic auth):
#   - ARMIS_API_TOKEN: Your Armis API token
#   - ARMIS_TENANT_ID: Your Armis tenant identifier

name: Armis Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Armis Security Scan
        # Pin to @v1 for non-breaking updates, or @v1.10.2 / a commit SHA to
        # freeze the action definition. The action installs the latest released
        # CLI binary, so pinning the ref alone does not pin the CLI version.
        uses: ArmisSecurity/armis-cli@v1
        with:
          scan-type: repo
          scan-target: '.'
          client-id: ${{ secrets.ARMIS_CLIENT_ID }}
          client-secret: ${{ secrets.ARMIS_CLIENT_SECRET }}
          format: sarif
          output-file: results.sarif
          fail-on: HIGH,CRITICAL

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

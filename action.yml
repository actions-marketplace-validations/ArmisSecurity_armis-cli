name: 'Armis Security Scanner'
description: 'Enterprise-grade security scanning for repositories and container images with Armis Cloud'
author: 'Armis Security'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-type:
    description: 'Type of scan to perform: repo or image'
    required: true
  scan-target:
    description: 'Target to scan (path for repo, image name for image scan)'
    required: false
    default: '.'
  client-id:
    description: 'Client ID for JWT authentication (recommended)'
    required: false
  client-secret:
    description: 'Client secret for JWT authentication (recommended)'
    required: false
  region:
    description: 'Armis cloud region for JWT authentication'
    required: false
    default: ''
  api-token:
    description: 'Armis API token for Basic authentication (legacy)'
    required: false
  tenant-id:
    description: 'Tenant identifier for Armis Cloud (legacy, not needed with JWT)'
    required: false
  format:
    description: 'Output format: human, json, sarif, junit'
    required: false
    default: 'sarif'
  fail-on:
    description: 'Comma-separated severity levels to fail on (e.g., HIGH,CRITICAL). Empty string for informational mode (never fail).'
    required: false
    default: ''
  exit-code:
    description: 'Exit code to return when build fails'
    required: false
    default: '1'
  no-progress:
    description: 'Disable progress indicators'
    required: false
    default: 'true'
  image-tarball:
    description: 'Path to image tarball (only for image scans)'
    required: false
  output-file:
    description: 'File path to write scan results (optional)'
    required: false
  scan-timeout:
    description: 'Scan timeout in minutes'
    required: false
    default: '60'
  include-files:
    description: 'Comma-separated list of file paths to scan (relative to repository root)'
    required: false
    default: ''
  build-from-source:
    description: 'Build CLI from source instead of downloading release (for testing)'
    required: false
    default: 'false'

outputs:
  results:
    description: 'Scan results in the specified format'
    value: ${{ steps.scan.outputs.results }}
  exit-code:
    description: 'Exit code from the scan'
    value: ${{ steps.scan.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      if: inputs.build-from-source == 'true'
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'

    - name: Build Armis CLI from source
      if: inputs.build-from-source == 'true'
      shell: bash
      run: |
        echo "Building Armis CLI from source..."
        go build -o armis-cli ./cmd/armis-cli
        mkdir -p "$HOME/.local/bin"
        mv armis-cli "$HOME/.local/bin/"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Armis CLI from release
      if: inputs.build-from-source != 'true'
      shell: bash
      run: |
        echo "Installing Armis CLI..."

        # Detect OS and architecture
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        case "$OS" in
          linux*)  OS="linux" ;;
          darwin*) OS="darwin" ;;
          *)       echo "Error: Unsupported OS: $OS"; exit 1 ;;
        esac

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)            echo "Error: Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # Download binary directly from GitHub releases
        REPO="ArmisSecurity/armis-cli"
        ARCHIVE_NAME="armis-cli-${OS}-${ARCH}.tar.gz"
        CHECKSUMS_NAME="armis-cli-checksums.txt"
        BASE_URL="https://github.com/${REPO}/releases/latest/download"

        TMP_DIR=$(mktemp -d)
        trap 'rm -rf "$TMP_DIR"' EXIT

        echo "Downloading $ARCHIVE_NAME..."
        curl -fsSL "${BASE_URL}/${ARCHIVE_NAME}" -o "${TMP_DIR}/${ARCHIVE_NAME}"
        curl -fsSL "${BASE_URL}/${CHECKSUMS_NAME}" -o "${TMP_DIR}/${CHECKSUMS_NAME}"

        # Verify checksum
        echo "Verifying checksum..."
        cd "$TMP_DIR"
        EXPECTED=$(grep " ${ARCHIVE_NAME}$" "$CHECKSUMS_NAME" | awk '{print $1}')
        if command -v sha256sum > /dev/null 2>&1; then
          ACTUAL=$(sha256sum "$ARCHIVE_NAME" | awk '{print $1}')
        else
          ACTUAL=$(shasum -a 256 "$ARCHIVE_NAME" | awk '{print $1}')
        fi

        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "Error: Checksum verification failed!"
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          exit 1
        fi
        echo "Checksum verified successfully"

        # Extract and install
        tar -xzf "$ARCHIVE_NAME"
        mkdir -p "$HOME/.local/bin"
        mv armis-cli "$HOME/.local/bin/"
        chmod +x "$HOME/.local/bin/armis-cli"
        echo "Armis CLI installed successfully"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify Installation
      shell: bash
      run: |
        armis-cli --version

    - name: Run Security Scan
      id: scan
      shell: bash
      env:
        INPUT_CLIENT_ID: ${{ inputs.client-id }}
        INPUT_CLIENT_SECRET: ${{ inputs.client-secret }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_API_TOKEN: ${{ inputs.api-token }}
        INPUT_TENANT_ID: ${{ inputs.tenant-id }}
        SCAN_TYPE: ${{ inputs.scan-type }}
        SCAN_TARGET: ${{ inputs.scan-target }}
        OUTPUT_FORMAT: ${{ inputs.format }}
        FAIL_ON: ${{ inputs.fail-on }}
        EXIT_CODE_VAL: ${{ inputs.exit-code }}
        SCAN_TIMEOUT: ${{ inputs.scan-timeout }}
        NO_PROGRESS: ${{ inputs.no-progress }}
        IMAGE_TARBALL: ${{ inputs.image-tarball }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        INCLUDE_FILES: ${{ inputs.include-files }}
      run: |
        set +e

        # Set ARMIS_* env vars only when inputs are non-empty (avoids overriding job/step-level env)
        if [ -n "$INPUT_CLIENT_ID" ]; then export ARMIS_CLIENT_ID="$INPUT_CLIENT_ID"; fi
        if [ -n "$INPUT_CLIENT_SECRET" ]; then export ARMIS_CLIENT_SECRET="$INPUT_CLIENT_SECRET"; fi
        if [ -n "$INPUT_REGION" ]; then export ARMIS_REGION="$INPUT_REGION"; fi
        if [ -n "$INPUT_API_TOKEN" ]; then export ARMIS_API_TOKEN="$INPUT_API_TOKEN"; fi
        if [ -n "$INPUT_TENANT_ID" ]; then export ARMIS_TENANT_ID="$INPUT_TENANT_ID"; fi

        # Validate authentication: require JWT (client-id + client-secret) OR Basic (api-token + tenant-id)
        if [ -n "$ARMIS_CLIENT_ID" ] && [ -z "$ARMIS_CLIENT_SECRET" ]; then
          echo "Error: 'client-id' provided without 'client-secret'. Both are required for JWT authentication."
          exit 1
        fi
        if [ -z "$ARMIS_CLIENT_ID" ] && [ -n "$ARMIS_CLIENT_SECRET" ]; then
          echo "Error: 'client-secret' provided without 'client-id'. Both are required for JWT authentication."
          exit 1
        fi
        # Only validate Basic auth pairing when JWT is not configured (JWT takes precedence)
        if [ -z "$ARMIS_CLIENT_ID" ]; then
          if [ -n "$ARMIS_API_TOKEN" ] && [ -z "$ARMIS_TENANT_ID" ]; then
            echo "Error: 'api-token' provided without 'tenant-id'. Both are required for Basic authentication."
            exit 1
          fi
          if [ -z "$ARMIS_API_TOKEN" ] && [ -n "$ARMIS_TENANT_ID" ]; then
            echo "Error: 'tenant-id' provided without 'api-token'. Both are required for Basic authentication."
            exit 1
          fi
          if [ -z "$ARMIS_API_TOKEN" ]; then
            echo "Error: No authentication provided. Set 'client-id' + 'client-secret' (recommended) or 'api-token' + 'tenant-id' (legacy)."
            exit 1
          fi
        fi

        # Validate scan-type to prevent injection
        if [[ "$SCAN_TYPE" != "repo" && "$SCAN_TYPE" != "image" ]]; then
          echo "Error: Invalid scan-type '$SCAN_TYPE'. Must be 'repo' or 'image'."
          exit 1
        fi

        # Build command arguments array for safe execution
        SCAN_ARGS=("scan" "$SCAN_TYPE" "$SCAN_TARGET")
        if [ -n "$ARMIS_TENANT_ID" ] && [ -z "$ARMIS_CLIENT_ID" ]; then
          SCAN_ARGS+=("--tenant-id" "$ARMIS_TENANT_ID")
        fi
        SCAN_ARGS+=("--format" "$OUTPUT_FORMAT")

        if [ -n "$FAIL_ON" ]; then
          SCAN_ARGS+=("--fail-on" "$FAIL_ON")
        fi

        SCAN_ARGS+=("--exit-code" "$EXIT_CODE_VAL")
        SCAN_ARGS+=("--scan-timeout" "$SCAN_TIMEOUT")

        if [ "$NO_PROGRESS" = "true" ]; then
          SCAN_ARGS+=("--no-progress")
        fi

        if [ "$SCAN_TYPE" = "image" ] && [ -n "$IMAGE_TARBALL" ]; then
          SCAN_ARGS+=("--tarball" "$IMAGE_TARBALL")
        fi

        if [ -n "$INCLUDE_FILES" ]; then
          SCAN_ARGS+=("--include-files" "$INCLUDE_FILES")
        fi

        # Execute command safely without eval
        if [ -n "$OUTPUT_FILE" ]; then
          armis-cli "${SCAN_ARGS[@]}" > "$OUTPUT_FILE"
          SCAN_EXIT_CODE=$?
          SCAN_RESULTS=$(cat "$OUTPUT_FILE")
        else
          SCAN_RESULTS=$(armis-cli "${SCAN_ARGS[@]}")
          SCAN_EXIT_CODE=$?
        fi

        echo "exit-code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT

        # For multiline output, use heredoc
        echo "results<<EOF" >> $GITHUB_OUTPUT
        echo "$SCAN_RESULTS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        exit $SCAN_EXIT_CODE

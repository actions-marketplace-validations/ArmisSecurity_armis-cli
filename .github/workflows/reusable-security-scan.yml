name: Reusable Armis Security Scan

on:
  workflow_call:
    inputs:
      scan-type:
        description: 'Type of scan to perform: repo or image'
        type: string
        default: 'repo'
      scan-target:
        description: 'Target to scan (path for repo, image name for image scan)'
        type: string
        default: '.'
      fail-on:
        description: 'Comma-separated severity levels to fail on (e.g., HIGH,CRITICAL). Empty string for informational mode (never fail).'
        type: string
        default: ''
      pr-comment:
        description: 'Post scan results as PR comment'
        type: boolean
        default: true
      upload-artifact:
        description: 'Upload SARIF results as artifact'
        type: boolean
        default: true
      artifact-retention-days:
        description: 'Number of days to retain artifacts'
        type: number
        default: 30
      image-tarball:
        description: 'Path to image tarball (only for image scans)'
        type: string
        default: ''
      scan-timeout:
        description: 'Scan timeout in minutes'
        type: number
        default: 60
      include-files:
        description: 'Comma-separated list of file paths to scan (relative to repository root)'
        type: string
        default: ''
      region:
        description: 'Armis cloud region for JWT authentication (overrides auto-discovery)'
        type: string
        default: ''
      build-from-source:
        description: 'Build CLI from source instead of downloading release (for testing scanner changes)'
        type: boolean
        default: false
      category:
        description: 'Category for GitHub Code Scanning SARIF upload (use unique values per workflow to prevent alert reopening)'
        type: string
        default: 'armis-security-scan'
    secrets:
      client-id:
        description: 'Client ID for JWT authentication (recommended)'
        required: false
      client-secret:
        description: 'Client secret for JWT authentication (recommended)'
        required: false
      api-token:
        description: 'Armis API token for Basic authentication (legacy)'
        required: false
      tenant-id:
        description: 'Tenant identifier for Armis Cloud (legacy, not needed with JWT)'
        required: false

# Top-level permissions define the maximum permissions available to this workflow.
# Job-level permissions further restrict as needed.
permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  security-scan:
    name: Armis Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 135
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Run Armis Security Scan
        id: armis_scan
        uses: ArmisSecurity/armis-cli@main
        with:
          scan-type: ${{ inputs.scan-type }}
          scan-target: ${{ inputs.scan-target }}
          client-id: ${{ secrets.client-id }}
          client-secret: ${{ secrets.client-secret }}
          region: ${{ inputs.region }}
          api-token: ${{ secrets.api-token }}
          tenant-id: ${{ secrets.tenant-id }}
          format: sarif
          fail-on: ${{ inputs.fail-on }}
          output-file: armis-results.sarif
          image-tarball: ${{ inputs.image-tarball }}
          scan-timeout: ${{ inputs.scan-timeout }}
          include-files: ${{ inputs.include-files }}
          build-from-source: ${{ inputs.build-from-source }}
        continue-on-error: true

      - name: Ensure SARIF exists
        if: always()
        run: |
          if [ ! -s armis-results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"armis-cli","version":"1.0.0"}},"results":[]}]}' > armis-results.sarif
          fi

      - name: Post PR Comment with Results
        if: always() && inputs.pr-comment && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            // Read SARIF results
            const sarif = JSON.parse(fs.readFileSync('armis-results.sarif', 'utf8'));
            const results = sarif.runs?.[0]?.results || [];

            // Count by severity - read from properties.severity if available
            const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0, INFO: 0 };
            for (const r of results) {
              // Prefer properties.severity (set by armis-cli), fallback to level mapping
              const severity = r.properties?.severity || {
                'error': 'HIGH',
                'warning': 'MEDIUM',
                'note': 'LOW',
                'none': 'INFO'
              }[r.level || 'warning'] || 'INFO';
              counts[severity]++;
            }
            const total = results.length;

            // Build comment body
            const marker = '<!-- armis-security-scan -->';
            const status = counts.CRITICAL > 0 ? '🔴 CRITICAL issues found' :
                           counts.HIGH > 0 ? '🟠 HIGH issues found' :
                           total > 0 ? '🟡 Issues found' : '✅ No issues';

            const workflowRef = process.env.GITHUB_WORKFLOW_REF || '';
            const ref = workflowRef.split('@')[1] || 'main';
            const logoLight = `https://raw.githubusercontent.com/ArmisSecurity/armis-cli/${ref}/docs/assets/appsec-logo-light.png`;
            const logoDark = `https://raw.githubusercontent.com/ArmisSecurity/armis-cli/${ref}/docs/assets/appsec-logo-dark.png`;
            // GitHub theme-aware images with height constraint (24px to match heading text)
            const logo = `<img alt="Armis AppSec" src="${logoLight}#gh-dark-mode-only" height="24"><img alt="Armis AppSec" src="${logoDark}#gh-light-mode-only" height="24">`;

            let body = `${marker}\n## ${logo}&nbsp;Security Scan Results\n\n**${status}**\n`;
            if (total > 0) {
              body += `\n| Severity | Count |\n|----------|-------|\n`;
              if (counts.CRITICAL > 0) body += `| 🔴 CRITICAL | ${counts.CRITICAL} |\n`;
              if (counts.HIGH > 0) body += `| 🟠 HIGH | ${counts.HIGH} |\n`;
              if (counts.MEDIUM > 0) body += `| 🟡 MEDIUM | ${counts.MEDIUM} |\n`;
              if (counts.LOW > 0) body += `| 🔵 LOW | ${counts.LOW} |\n`;
              if (counts.INFO > 0) body += `| ⚪ INFO | ${counts.INFO} |\n`;
              body += `\n**Total: ${total}**\n`;
            }

            // Build detailed findings section
            if (total > 0) {
              body += `\n<details><summary>View all ${total} findings</summary>\n\n`;

              // Group results by severity
              const severityOrder = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'INFO'];
              const severityEmoji = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', INFO: '⚪' };

              for (const severity of severityOrder) {
                const severityResults = results.filter(r =>
                  (r.properties?.severity || 'INFO') === severity
                );

                if (severityResults.length > 0) {
                  body += `### ${severityEmoji[severity]} ${severity} (${severityResults.length})\n\n`;

                  for (const r of severityResults) {
                    const file = r.locations?.[0]?.physicalLocation?.artifactLocation?.uri || '';
                    const line = r.locations?.[0]?.physicalLocation?.region?.startLine || '';
                    const location = file ? (line ? `${file}:${line}` : file) : 'Unknown location';

                    // Parse title and description from message
                    const msgParts = (r.message?.text || '').split(': ');
                    const title = msgParts[0] || r.ruleId;
                    const description = msgParts.slice(1).join(': ') || '';

                    body += `<details><summary><code>${r.ruleId}</code> - ${title}</summary>\n\n`;
                    body += `**Location:** \`${location}\`\n\n`;

                    if (description) {
                      body += `${description}\n\n`;
                    }

                    // Code snippet
                    const snippet = r.properties?.codeSnippet;
                    if (snippet) {
                      body += '```\n' + snippet + '\n```\n\n';
                    }

                    // CVEs and CWEs
                    const cves = r.properties?.cves || [];
                    const cwes = r.properties?.cwes || [];
                    if (cves.length > 0) {
                      body += `**CVEs:** ${cves.join(', ')}\n\n`;
                    }
                    if (cwes.length > 0) {
                      body += `**CWEs:** ${cwes.join(', ')}\n\n`;
                    }

                    // Package info
                    const pkg = r.properties?.package;
                    const version = r.properties?.version;
                    const fixVersion = r.properties?.fixVersion;
                    if (pkg) {
                      let pkgInfo = `**Package:** ${pkg}`;
                      if (version) pkgInfo += ` (${version})`;
                      if (fixVersion) pkgInfo += ` → Fix: ${fixVersion}`;
                      body += pkgInfo + '\n\n';
                    }

                    body += `</details>\n\n`;
                  }
                }
              }

              body += `</details>`;
            }

            // Find and update existing comment, or create new
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: armis-results.sarif
          category: ${{ inputs.category }}

      - name: Upload SARIF as Artifact
        if: always() && inputs.upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: armis-security-results
          path: armis-results.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Analyze Scan Results
        id: scan_analysis
        if: always()
        run: |
          # Check if SARIF file exists and has valid JSON results
          if [ -s armis-results.sarif ]; then
            if RESULTS=$(jq -r '.runs[0].results | length' armis-results.sarif 2>/dev/null); then
              echo "has_results=true" >> $GITHUB_OUTPUT
            else
              RESULTS=0
              echo "has_results=false" >> $GITHUB_OUTPUT
            fi
            echo "results_count=$RESULTS" >> $GITHUB_OUTPUT
          else
            echo "results_count=0" >> $GITHUB_OUTPUT
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for Failures
        if: always()
        env:
          SCAN_OUTCOME: ${{ steps.armis_scan.outcome }}
          HAS_RESULTS: ${{ steps.scan_analysis.outputs.has_results }}
          RESULTS_COUNT: ${{ steps.scan_analysis.outputs.results_count }}
          FAIL_ON: ${{ inputs.fail-on }}
        run: |
          # First, check for operational failures (timeout, API errors, etc.)
          # These should always fail regardless of informational mode
          if [ "$SCAN_OUTCOME" = "failure" ] || [ "$SCAN_OUTCOME" = "cancelled" ]; then
            if [ "$HAS_RESULTS" = "false" ]; then
              # Scan failed without producing valid SARIF - likely timeout or API error
              echo "::error::Armis scan failed (timeout, API error, or other issue). Check the 'Run Armis Security Scan' step for details."
              exit 1
            fi
            # Scan step failed but valid SARIF exists. This can mean:
            # - Findings exceeded --fail-on threshold (exit 1) -> fall through to threshold check
            # - Scan completed but result retrieval had transient error (exit 2) -> RESULTS_COUNT=0, passes threshold check
          fi

          # Informational mode: if fail-on is empty, never fail on findings
          # (but operational failures above are still caught)
          if [ -z "$FAIL_ON" ]; then
            echo "Scan completed in informational mode (no fail-on threshold). Found ${RESULTS_COUNT:-0} issues."
            exit 0
          fi

          # Check if findings exceeded threshold (only if scan actually produced findings)
          if [ "$SCAN_OUTCOME" = "failure" ] && [ "${RESULTS_COUNT:-0}" -gt 0 ]; then
            echo "::error::Security vulnerabilities detected by Armis (threshold: $FAIL_ON). Found $RESULTS_COUNT issues."
            exit 1
          fi

          echo "Scan completed successfully with no issues above threshold."
